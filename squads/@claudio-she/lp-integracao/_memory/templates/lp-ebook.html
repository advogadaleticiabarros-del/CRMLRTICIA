<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{META_TITLE}} | {{EMPRESA_NOME}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family={{FONT_HEADING}}:wght@400;600;700;800&family={{FONT_BODY}}:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset WordPress */
    #page,#content,.site-content,.entry-content,.wp-block-post-content,.elementor-section-wrap{all:unset!important;display:block!important;padding:0!important;margin:0!important;max-width:none!important;width:100%!important;}

    :root {
      --primary:      {{COLOR_PRIMARY}};
      --accent:       {{COLOR_ACCENT}};
      --accent-hover: {{COLOR_ACCENT_HOVER}};
      --dark:         {{COLOR_DARK}};
      --light:        {{COLOR_LIGHT}};
      --text:         {{COLOR_TEXT}};
      --muted:        {{COLOR_MUTED}};
      --font-h:       '{{FONT_HEADING}}', sans-serif;
      --font-b:       '{{FONT_BODY}}', sans-serif;
      --r-btn:        {{BTN_RADIUS}}px;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--font-b);color:var(--text);background:#fff;-webkit-font-smoothing:antialiased;}
    img{max-width:100%;height:auto;display:block;}
    a{text-decoration:none;}

    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .reveal{opacity:0;}
    .fade-in{animation:fadeInUp .6s cubic-bezier(.22,1,.36,1) forwards;}
    .d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}

    .container{max-width:960px;margin:0 auto;padding:0 24px;}

    /* ─── HERO (página inteira) ─── */
    .hero{min-height:100vh;display:flex;align-items:center;background:linear-gradient(135deg,rgba(0,0,0,.92) 0%,rgba(0,0,0,.80) 100%),url('{{HERO_IMAGE_URL}}') center/cover no-repeat;padding:64px 0;}
    .hero__inner{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;}
    .hero__logo{height:38px;filter:brightness(0) invert(1);margin-bottom:28px;}
    .hero__badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:7px 16px;font-size:12px;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:18px;}
    .hero__headline{font-family:var(--font-h);font-size:clamp(1.9rem,4.5vw,3rem);font-weight:800;line-height:1.18;letter-spacing:-.02em;color:#fff;margin-bottom:16px;}
    .hero__headline em{color:var(--accent);font-style:normal;}
    .hero__desc{font-size:clamp(.95rem,2vw,1.1rem);line-height:1.75;color:rgba(255,255,255,.72);margin-bottom:0;}

    /* ─── FORM CARD ─── */
    .form-card{background:rgba(255,255,255,.97);border-radius:20px;padding:40px;box-shadow:0 32px 80px rgba(0,0,0,.35);}
    .form-card__eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
    .form-card__title{font-family:var(--font-h);font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:24px;line-height:1.3;}
    .form-field{margin-bottom:14px;}
    .form-label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
    .form-input{width:100%;background:#f8f9fa;border:1.5px solid #e5e7eb;border-radius:8px;padding:13px 16px;color:var(--text);font-family:var(--font-b);font-size:.95rem;transition:border-color .2s;}
    .form-input:focus{outline:none;border-color:var(--accent);background:#fff;}
    .btn-cta{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r-btn);padding:17px;font-family:var(--font-b);font-size:1.05rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s,background .2s;margin-top:8px;text-align:center;}
    .btn-cta:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.2);background:var(--accent-hover);}
    .form-microcopy{color:var(--muted);font-size:.78rem;text-align:center;margin-top:12px;}

    /* ─── RODAPÉ ─── */
    .footer{background:#0a0a0a;padding:28px 0;text-align:center;}
    .footer__logo{height:28px;filter:brightness(0) invert(1);margin:0 auto 12px;}
    .footer__links{display:flex;justify-content:center;gap:20px;margin-bottom:12px;}
    .footer__link{color:rgba(255,255,255,.35);font-size:.78rem;transition:color .2s;}
    .footer__link:hover{color:rgba(255,255,255,.6);}
    .footer__copy{color:rgba(255,255,255,.25);font-size:.75rem;}

    @media(max-width:768px){
      .hero{padding:48px 0;}
      .hero__inner{grid-template-columns:1fr;gap:40px;}
      .form-card{padding:28px 20px;}
    }
  </style>
</head>
<body>

<!-- ═══════════ META PIXEL ═══════════ -->
<!-- PIXEL META: inserir após obter o ID com o mentor -->

<!-- ═══════════ HERO + FORM ═══════════ -->
<section class="hero">
  <div class="container">
    <div class="hero__inner">

      <!-- Lado esquerdo: copy -->
      <div>
        <img src="{{EMPRESA_LOGO_URL}}" alt="{{EMPRESA_NOME}}" class="hero__logo reveal d1">
        <div class="hero__badge reveal d2">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--accent)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          {{HERO_BADGE}}
        </div>
        <h1 class="hero__headline reveal d2">{{HERO_HEADLINE}} <em>{{HERO_HEADLINE_DESTAQUE}}</em></h1>
        <p class="hero__desc reveal d3">{{HERO_DESCRICAO}}</p>
      </div>

      <!-- Lado direito: formulário -->
      <div class="form-card reveal d2">
        <div class="form-card__eyebrow">{{FORM_EYEBROW}}</div>
        <div class="form-card__title">{{FORM_TITULO}}</div>
        <form id="lp-form">
          <div class="form-field">
            <label class="form-label" for="nome">Nome</label>
            <input class="form-input" type="text" id="nome" name="nome" placeholder="{{FORM_PLACEHOLDER_NOME}}" required>
          </div>
          <div class="form-field">
            <label class="form-label" for="email">E-mail</label>
            <input class="form-input" type="email" id="email" name="email" placeholder="{{FORM_PLACEHOLDER_EMAIL}}" required>
          </div>
          <div class="form-field">
            <label class="form-label" for="telefone">WhatsApp</label>
            <input class="form-input" type="tel" id="telefone" name="telefone" placeholder="{{FORM_PLACEHOLDER_TELEFONE}}" required>
          </div>
          <div class="form-field">
            <label class="form-label" for="empresa">Empresa</label>
            <input class="form-input" type="text" id="empresa" name="empresa" placeholder="{{FORM_PLACEHOLDER_EMPRESA}}" required>
          </div>
          <button type="submit" class="btn-cta">{{CTA_TEXTO}}</button>
        </form>
        <p class="form-microcopy">{{FORM_MICROCOPY}}</p>
      </div>

    </div>
  </div>
</section>

<!-- ═══════════ RODAPÉ ═══════════ -->
<footer class="footer">
  <div class="container">
    <img src="{{EMPRESA_LOGO_URL}}" alt="{{EMPRESA_NOME}}" class="footer__logo">
    <div class="footer__links">
      <a href="{{URL_PRIVACIDADE}}" class="footer__link">Política de Privacidade</a>
      <a href="{{URL_TERMOS}}" class="footer__link">Termos de Uso</a>
    </div>
    <p class="footer__copy">© {{ANO}} {{EMPRESA_NOME}}. Todos os direitos reservados.</p>
  </div>
</footer>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('fade-in'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  const lpForm = document.getElementById('lp-form');
  if (lpForm) {
    lpForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = lpForm.querySelector('[type=submit]');
      if (btn) { btn.textContent = 'Enviando...'; btn.disabled = true; }
      if (window.fbq) fbq('track', 'Lead');
      // DESTINO DO LEAD — configurar após handshake com Integration Engineer
      const THANK_YOU_URL = '{{URL_OBRIGADO}}';
      if (THANK_YOU_URL && THANK_YOU_URL.indexOf('http') === 0) {
        window.location.href = THANK_YOU_URL;
      } else {
        const nome = (lpForm.querySelector('[name=nome]') || {}).value || '';
        const tel = (lpForm.querySelector('[name=telefone]') || {}).value || '';
        const msg = encodeURIComponent('Olá! Me chamo ' + nome + ' e quero baixar o e-book. WhatsApp: ' + tel);
        window.open('https://wa.me/{{WHATSAPP_NUMBER}}?text=' + msg, '_blank');
        if (btn) { btn.textContent = '{{CTA_TEXTO}}'; btn.disabled = false; }
      }
    });
  }
</script>
</body>
</html>
