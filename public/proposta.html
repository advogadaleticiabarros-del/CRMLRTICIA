<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposta de Honorários — Letícia Barros</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --espresso: #211C18; --panel: #2C2520; --panel-2: #1d1814; --line: #3c3329;
      --gold: #C9A962; --gold-2: #B8943F; --gold-soft: #D4BC7D;
      --cream: #FAF6F0; --muted: #B0A48E; --muted-2: #8a8070;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif; color: var(--cream); line-height: 1.6; padding: 22px 18px 48px;
      background:
        radial-gradient(1100px 520px at 50% -8%, rgba(201,169,98,.16), transparent 60%),
        radial-gradient(800px 600px at 100% 100%, rgba(184,148,63,.08), transparent 55%),
        var(--espresso);
      min-height: 100vh;
    }
    .wrap { max-width: 720px; margin: 0 auto; }

    /* Entradas animadas (stagger) */
    @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
    @keyframes glow { 0%,100% { box-shadow: 0 0 0 1px rgba(201,169,98,.18), 0 18px 40px -24px rgba(0,0,0,.7); } 50% { box-shadow: 0 0 0 1px rgba(201,169,98,.35), 0 18px 44px -22px rgba(0,0,0,.7); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes pop { 0% { transform: scale(.6); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
    .anim { opacity: 0; animation: rise .7s cubic-bezier(.16,.8,.3,1) forwards; }

    .brand { text-align: center; padding: 14px 0 4px; }
    .seal-ring { width: 78px; height: 78px; border-radius: 50%; margin: 0 auto;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(201,169,98,.5); box-shadow: 0 0 0 6px rgba(201,169,98,.05), inset 0 0 0 1px rgba(201,169,98,.18); }
    .brand img { width: 52px; height: 52px; filter: drop-shadow(0 4px 12px rgba(0,0,0,.5)); }
    .brand h1 { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 33px; color: var(--gold); margin-top: 12px; letter-spacing: .5px; }
    .brand small { color: var(--gold-2); letter-spacing: 4px; text-transform: uppercase; font-size: 10.5px; }
    .divider { width: 54px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 14px auto 4px; }
    .ttl { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 600; color: var(--cream); text-align: center; letter-spacing: .3px; }
    .ttl em { font-style: italic; color: var(--gold-soft); }
    .ttl-sub { text-align: center; color: var(--muted); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 6px; margin-bottom: 4px; }

    .card {
      background: linear-gradient(180deg, var(--panel), #271f1a);
      border: 1px solid var(--line); border-radius: 18px; padding: 22px 24px;
      margin-top: 16px; box-shadow: 0 18px 40px -28px rgba(0,0,0,.8);
    }
    /* Cabeçalho de seção com algarismo romano (vernáculo dos contratos) */
    .sec-head { display: flex; align-items: baseline; gap: 13px; margin-bottom: 16px; padding-bottom: 11px; border-bottom: 1px solid rgba(201,169,98,.14); }
    .sec-head .rn { font-family: 'Cormorant Garamond', serif; font-size: 26px; line-height: 1; color: var(--gold-2); font-weight: 600; min-width: 24px; text-align: center; }
    .eyebrow { display: block; font-size: 9.5px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-2); margin-bottom: 3px; }
    .card h2 { font-family: 'Cormorant Garamond', serif; font-size: 21px; color: var(--gold); font-weight: 600; letter-spacing: .3px; line-height: 1.05; }

    /* Lacre — assinatura visual antes do aceite */
    .seal { display: flex; align-items: center; gap: 14px; margin: 26px 4px 4px; color: var(--gold-2); }
    .seal .ln { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,169,98,.5)); }
    .seal .ln.r { background: linear-gradient(90deg, rgba(201,169,98,.5), transparent); }
    .seal .mk { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-2); }

    .line { display: flex; justify-content: space-between; gap: 12px; padding: 9px 0; border-bottom: 1px solid rgba(60,51,41,.7); font-size: 14px; }
    .line:last-child { border-bottom: none; }
    .line span { color: var(--muted); }
    .line strong { color: var(--cream); text-align: right; font-weight: 600; }

    .hon { background: var(--panel-2); border-radius: 14px; padding: 4px 16px; border: 1px solid rgba(201,169,98,.14); }
    .hon .line.total { border-top: 1px solid rgba(201,169,98,.25); margin-top: 4px; padding-top: 12px; }
    .hon .line.total span { color: var(--gold-soft); font-weight: 600; font-size: 15px; }
    .hon .line.total strong {
      color: transparent; font-size: 22px; font-family: 'Cormorant Garamond', serif; font-weight: 700;
      background: linear-gradient(90deg, var(--gold-2), var(--gold-soft), var(--gold-2)); background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text; animation: shimmer 5s linear infinite;
    }

    .desc { font-size: 14.5px; color: #E8E0D2; white-space: pre-wrap; line-height: 1.75; }

    /* Cláusulas — seção ampla, sem rolagem, bem disposta */
    .card.clauses-card { padding: 26px 24px; }
    .clauses-intro { color: var(--muted); font-size: 12.5px; letter-spacing: .2px; margin-bottom: 16px; line-height: 1.6; }
    .clauses-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px; }
    .clause { display: flex; gap: 12px; align-items: flex-start; padding: 12px 14px; background: var(--panel-2);
      border: 1px solid rgba(201,169,98,.12); border-radius: 12px; transition: border-color .25s, transform .25s; }
    .clause:hover { border-color: rgba(201,169,98,.4); transform: translateY(-1px); }
    .cnum { flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--gold-soft), var(--gold-2));
      color: #231E1A; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .clause .ctxt { font-size: 12.5px; line-height: 1.6; color: #E2D9C9; }
    .clause .ctxt strong { display: block; color: var(--gold-soft); font-size: 12px; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
    @media (max-width: 560px) { .clauses-grid { grid-template-columns: 1fr; } }

    .agree { display: flex; align-items: flex-start; gap: 12px; margin-top: 16px; cursor: pointer; font-size: 14px; color: var(--cream);
      padding: 12px 14px; border: 1px solid var(--line); border-radius: 12px; transition: border-color .25s, background .25s; }
    .agree:hover { border-color: rgba(201,169,98,.5); }
    .agree.on { border-color: var(--gold); background: rgba(201,169,98,.08); }
    .agree input { width: 22px; height: 22px; flex-shrink: 0; accent-color: var(--gold); margin-top: 1px; cursor: pointer; }

    button { font-family: inherit; cursor: pointer; border: none; border-radius: 14px; font-weight: 600; }
    .btn-accept {
      width: 100%; margin-top: 18px; padding: 17px; font-size: 16px; letter-spacing: .3px; color: #231E1A;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold-2)); position: relative; overflow: hidden;
      box-shadow: 0 14px 30px -14px rgba(201,169,98,.6); transition: transform .2s, box-shadow .2s, opacity .2s;
    }
    .btn-accept:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 20px 38px -14px rgba(201,169,98,.7); }
    .btn-accept:active:not(:disabled) { transform: translateY(0); }
    .btn-accept:disabled { opacity: .45; cursor: not-allowed; filter: grayscale(.3); }

    .accepted { text-align: center; padding: 26px 18px; margin-top: 18px; border-radius: 16px;
      background: linear-gradient(180deg, rgba(143,185,138,.14), rgba(143,185,138,.05)); border: 1px solid rgba(143,185,138,.4); }
    .accepted .ck { width: 56px; height: 56px; border-radius: 50%; background: #8FB98A; color: #1d2a1b; display: flex; align-items: center;
      justify-content: center; font-size: 30px; margin: 0 auto 12px; animation: pop .5s cubic-bezier(.2,1.2,.3,1) both; }
    .accepted strong { color: #c7e0c2; font-size: 17px; }
    .accepted p { color: var(--muted); font-size: 13.5px; margin-top: 6px; }

    .btn-ghost { width: 100%; margin-top: 12px; padding: 13px; font-size: 13.5px; color: var(--gold-soft);
      background: transparent; border: 1px solid rgba(201,169,98,.4); border-radius: 12px; transition: background .2s, border-color .2s; }
    .btn-ghost:hover { background: rgba(201,169,98,.08); border-color: var(--gold); }
    .legal { color: var(--muted-2); font-size: 11.5px; margin-top: 22px; text-align: center; line-height: 1.6; }
    .state { text-align: center; padding: 60px 16px; color: var(--muted); }
    .spin { width: 34px; height: 34px; border: 3px solid rgba(201,169,98,.25); border-top-color: var(--gold); border-radius: 50%; margin: 0 auto 14px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand anim">
      <div class="seal-ring"><img src="/logo.png" alt="" onerror="this.parentElement.style.display='none'" /></div>
      <h1>Letícia Barros</h1>
      <small>Advocacia &amp; Consultoria</small>
      <div class="divider"></div>
    </div>
    <div id="content"><div class="state"><div class="spin"></div>Carregando sua proposta…</div></div>
    <p class="legal">Documento gerado eletronicamente · Advocacia Letícia Barros<br>Em caso de dúvidas, fale com o escritório.</p>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('t');
    const money = (v) => (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const fmtDate = (s) => { if (!s) return '—'; const d = new Date(String(s).slice(0,10) + 'T00:00:00'); return isNaN(d) ? '—' : d.toLocaleDateString('pt-BR'); };
    const AREA_PT = { trabalhista:'Trabalhista', gestante:'Gestante/Maternidade', familia:'Família', civel:'Cível', previdenciario:'Previdenciário', consumidor:'Consumidor', outro:'Outro' };
    const esc = (s) => String(s || '').replace(/[&<>]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c]));

    // Formata as observações/cláusulas: intro + itens numerados em grid (sem rolagem)
    function clausesHtml(text) {
      const blocks = String(text || '').split(/\n\s*\n/).map((s) => s.trim()).filter(Boolean);
      let intro = '';
      const items = [];
      for (const b of blocks) {
        const m = b.match(/^(\d+)\.\s*([\s\S]*)$/);
        if (m) {
          const rest = m[2];
          const ci = rest.indexOf(':');
          const title = ci > 0 && ci < 60 ? rest.slice(0, ci) : '';
          const body = ci > 0 && ci < 60 ? rest.slice(ci + 1).trim() : rest;
          items.push(`<div class="clause"><span class="cnum">${m[1]}</span><div class="ctxt">${title ? `<strong>${esc(title)}</strong>` : ''}${esc(body)}</div></div>`);
        } else { intro += (intro ? ' ' : '') + b; }
      }
      return `${intro ? `<p class="clauses-intro">${esc(intro)}</p>` : ''}<div class="clauses-grid">${items.join('')}</div>`;
    }

    function honHtml(h, valorFallback) {
      const pc = h && h.parcelamento;
      if (!pc || !pc.total) return `<div class="hon"><div class="line total"><span>Honorário total</span><strong>${money(valorFallback)}</strong></div></div>`;
      const qtd = Number(pc.parcelas) || 1;
      const ult = (qtd > 1 && pc.ultima_parcela && pc.ultima_parcela !== pc.valor_parcela) ? ` (última de ${money(pc.ultima_parcela)})` : '';
      return `<div class="hon">
        ${pc.entrada ? `<div class="line"><span>Entrada${pc.entrada_data ? ' · ' + fmtDate(pc.entrada_data) : ''}</span><strong>${money(pc.entrada)}</strong></div>` : ''}
        <div class="line"><span>Parcelas</span><strong>${qtd}× de ${money(pc.valor_parcela)}${ult}</strong></div>
        ${pc.primeiro_vencimento ? `<div class="line"><span>1º vencimento</span><strong>${fmtDate(pc.primeiro_vencimento)} · mensais</strong></div>` : ''}
        <div class="line total"><span>Honorário total</span><strong>${money(pc.total)}</strong></div>
      </div>`;
    }

    // ── Geração do PDF da proposta (versão clara, papel timbrado) ──────────────
    function clausesPrint(text) {
      const blocks = String(text || '').split(/\n\s*\n/).map((x) => x.trim()).filter(Boolean);
      let intro = ''; const items = [];
      for (const b of blocks) {
        const m = b.match(/^(\d+)\.\s*([\s\S]*)$/);
        if (m) { const rest = m[2]; const ci = rest.indexOf(':'); const title = ci > 0 && ci < 60 ? rest.slice(0, ci) : ''; const body = ci > 0 && ci < 60 ? rest.slice(ci + 1).trim() : rest;
          items.push(`<div class="pclause"><span class="pcnum">${m[1]}</span><div>${title ? `<strong>${esc(title)}</strong>` : ''}${esc(body)}</div></div>`);
        } else intro += (intro ? ' ' : '') + b;
      }
      return `${intro ? `<p class="pintro">${esc(intro)}</p>` : ''}<div class="pgrid">${items.join('')}</div>`;
    }
    function propostaPdfHtml(p) {
      const pc = (p.honorarios || {}).parcelamento;
      const logo = location.origin + '/logo.png';
      let hon = '';
      if (pc && pc.total) {
        if (pc.entrada) hon += `<div class="pline"><span>Entrada${pc.entrada_data ? ' · ' + fmtDate(pc.entrada_data) : ''}</span><b>${money(pc.entrada)}</b></div>`;
        hon += `<div class="pline"><span>Parcelas</span><b>${Number(pc.parcelas) || 1}× de ${money(pc.valor_parcela)}</b></div>`;
        if (pc.primeiro_vencimento) hon += `<div class="pline"><span>1º vencimento</span><b>${fmtDate(pc.primeiro_vencimento)} · mensais</b></div>`;
        hon += `<div class="pline ptot"><span>Honorário total</span><b>${money(pc.total)}</b></div>`;
      } else { hon = `<div class="pline ptot"><span>Honorário total</span><b>${money(p.valor)}</b></div>`; }
      let s = 0; const R = ['I', 'II', 'III', 'IV', 'V'];
      const head = (e, t) => `<div class="psh"><span class="prn">${R[s++]}</span><div><span class="peb">${e}</span><h2>${t}</h2></div></div>`;
      return `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><title>Proposta de Honorários</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
        <style>
          @page { margin: 1.4cm 1.6cm; }
          * { box-sizing: border-box; } body { font-family: 'Inter', sans-serif; color: #2b241d; font-size: 11.5pt; margin: 0; }
          @media screen { body { background: #ece7dd; } .sheet { background: #fff; max-width: 21cm; margin: 16px auto; padding: 1.4cm 1.6cm; box-shadow: 0 2px 16px rgba(0,0,0,.15); } }
          table.sheet { width: 100%; border-collapse: collapse; } thead td, tfoot td, tbody td { padding: 0; }
          .ph { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #B8943F; padding-bottom: 8px; margin-bottom: 16px; }
          .ph .bd { display: flex; align-items: center; gap: 10px; } .ph img { height: 1.3cm; }
          .ph .name { font-family: 'Cormorant Garamond', serif; font-size: 21pt; font-weight: 700; color: #2b2b2b; line-height: 1; }
          .ph .sub { font-size: 7pt; letter-spacing: 3px; text-transform: uppercase; color: #B8943F; }
          .ph .oab { font-size: 9pt; color: #666; }
          .title { text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 23pt; color: #2b241d; margin: 4px 0 0; }
          .title em { font-style: italic; color: #B8943F; }
          .subtitle { text-align: center; font-size: 8pt; letter-spacing: 2.5px; text-transform: uppercase; color: #9a8f7d; margin-bottom: 14px; }
          .psh { display: flex; align-items: baseline; gap: 10px; border-bottom: 1px solid #e6dcc9; padding-bottom: 6px; margin: 16px 0 10px; }
          .psh .prn { font-family: 'Cormorant Garamond', serif; font-size: 18pt; color: #B8943F; min-width: 20px; }
          .psh .peb { display: block; font-size: 7pt; letter-spacing: 2.5px; text-transform: uppercase; color: #B8943F; }
          .psh h2 { font-family: 'Cormorant Garamond', serif; font-size: 15pt; color: #2b241d; }
          .pline { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #efe7d8; font-size: 11pt; } .pline span { color: #8a8070; } .pline b { color: #2b241d; }
          .pcard { background: #faf6ef; border: 1px solid #ecdfc7; border-radius: 8px; padding: 2px 14px; }
          .ptot { border-bottom: none; border-top: 1px solid #e3d4b6; margin-top: 2px; padding-top: 10px; } .ptot span { font-weight: 600; color: #6a5a3a; } .ptot b { font-family: 'Cormorant Garamond', serif; font-size: 17pt; color: #B8943F; }
          .pintro { font-size: 9pt; color: #8a8070; margin-bottom: 10px; }
          .pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; }
          .pclause { display: flex; gap: 9px; border: 1px solid #ecdfc7; border-radius: 8px; padding: 8px 10px; font-size: 9.5pt; line-height: 1.5; page-break-inside: avoid; }
          .pclause .pcnum { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: #B8943F; color: #fff; font-weight: 700; font-size: 10pt; display: flex; align-items: center; justify-content: center; }
          .pclause strong { display: block; color: #8a6d2f; font-size: 8.5pt; text-transform: uppercase; letter-spacing: .4px; }
          .desc { white-space: pre-wrap; font-size: 11pt; line-height: 1.7; }
          .pf { border-top: 1px solid #B8943F; padding-top: 6px; text-align: center; font-size: 8pt; color: #777; }
          .foot-sp { height: 1.1cm; }
          @media print { .no-print { display: none; } }
        </style></head><body>
        <table class="sheet">
          <thead><tr><td>
            <div class="ph"><div class="bd"><img src="${logo}" onerror="this.style.display='none'"><div><div class="name">LETÍCIA BARROS</div><div class="sub">Advocacia &amp; Consultoria</div></div></div><div class="oab">OAB Nº 39.948 - ES</div></div>
          </td></tr></thead>
          <tfoot><tr><td><div class="foot-sp"></div></td></tr></tfoot>
          <tbody><tr><td>
            <p class="title">Proposta de <em>Honorários</em></p>
            <p class="subtitle">Preparada com cuidado para o seu caso</p>
            ${head('A parte', 'Cliente')}
            <div class="pline"><span>Nome</span><b>${esc(p.contact_name)}</b></div>
            <div class="pline"><span>Área</span><b>${esc(AREA_PT[p.legal_area] || p.legal_area || '—')}</b></div>
            <div class="pline"><span>Tipo de causa</span><b>${esc(p.tipo_causa || '—')}</b></div>
            ${head('Valores e pagamento', 'Honorários')}
            <div class="pcard">${hon}</div>
            ${p.observacoes ? `${head('Termos do acordo', 'Condições e cláusulas')}${clausesPrint(p.observacoes)}` : ''}
            ${p.description ? `${head('O caso', 'Resumo')}<div class="desc">${esc(p.description)}</div>` : ''}
            ${p.validade ? `<p style="text-align:center;color:#9a8f7d;font-size:9pt;margin-top:14px">Validade desta proposta: ${fmtDate(p.validade)}</p>` : ''}
          </td></tr></tbody>
        </table>
        <div class="pf" style="max-width:21cm;margin:0 auto">(27) 99515-1402 | (44) 99101-1402 · advogadaleticia.barros@gmail.com · @adv.leticiabarros2</div>
        <div class="no-print" style="text-align:center;margin:18px 0"><button onclick="window.print()" style="padding:10px 24px;font-size:14px;cursor:pointer">Imprimir / Salvar PDF</button></div>
        </body></html>`;
    }
    function baixarPdf() {
      const w = window.open('', '_blank'); if (!w) { alert('Permita pop-ups para baixar o PDF.'); return; }
      w.document.write(propostaPdfHtml(window._p)); w.document.close(); setTimeout(() => w.focus(), 400);
    }

    async function load() {
      const root = document.getElementById('content');
      if (!token) { root.innerHTML = '<div class="state">Link inválido.</div>'; return; }
      let p;
      try { const r = await fetch('/api/public/proposta/' + encodeURIComponent(token)); if (!r.ok) throw 0; p = await r.json(); window._p = p; }
      catch { root.innerHTML = '<div class="state">Proposta não encontrada ou link expirado.</div>'; return; }

      const h = p.honorarios || {};
      const aceito = !!p.aceito_em;
      let d = 0; const delay = () => `style="animation-delay:${(d++ * .12).toFixed(2)}s"`;
      const R = ['I', 'II', 'III', 'IV', 'V']; let s = 0;
      const head = (eyebrow, titulo) => `<div class="sec-head"><span class="rn">${R[s++]}</span><div><span class="eyebrow">${eyebrow}</span><h2>${titulo}</h2></div></div>`;

      root.innerHTML = `
        <p class="ttl anim" ${delay()}>Proposta de <em>Honorários</em></p>
        <p class="ttl-sub anim" ${delay()}>Preparada com cuidado para o seu caso</p>

        <div class="card anim" ${delay()}>
          ${head('A parte', 'Cliente')}
          <div class="line"><span>Nome</span><strong>${esc(p.contact_name)}</strong></div>
          <div class="line"><span>Área</span><strong>${esc(AREA_PT[p.legal_area] || p.legal_area || '—')}</strong></div>
          <div class="line"><span>Tipo de causa</span><strong>${esc(p.tipo_causa || '—')}</strong></div>
        </div>

        <div class="card anim" ${delay()}>
          ${head('Valores e pagamento', 'Honorários')}
          ${honHtml(h, p.valor)}
        </div>

        ${p.observacoes ? `
        <div class="card clauses-card anim" ${delay()}>
          ${head('Termos do acordo', 'Condições e cláusulas')}
          ${clausesHtml(p.observacoes)}
          <label class="agree" id="agree-box">
            <input type="checkbox" id="agree" ${aceito ? 'checked disabled' : ''}>
            <span>Li e concordo com as condições e cláusulas acima.</span>
          </label>
        </div>` : ''}

        ${p.description ? `
        <div class="card anim" ${delay()}>
          ${head('O caso', 'Resumo')}
          <div class="desc">${esc(p.description)}</div>
        </div>` : ''}

        ${p.validade ? `<p class="legal">Validade desta proposta: ${fmtDate(p.validade)}</p>` : ''}
        <div class="seal anim" ${delay()}><span class="ln"></span><span class="mk">Aceite</span><span class="ln r"></span></div>
        <div class="anim" ${delay()} id="accept-area"></div>
        <button class="btn-ghost anim" ${delay()} id="dl-pdf">Baixar proposta em PDF</button>`;
      document.getElementById('dl-pdf').onclick = baixarPdf;
      if (new URLSearchParams(location.search).has('pdf')) setTimeout(baixarPdf, 500);

      const area = document.getElementById('accept-area');
      const hasClauses = !!p.observacoes;
      const agree = document.getElementById('agree');
      const agreeBox = document.getElementById('agree-box');

      const showAccepted = () => { area.innerHTML = `
        <div class="accepted">
          <div class="ck">✓</div>
          <strong>Proposta aceita. Muito obrigada!</strong>
          <p>Seu contrato de prestação de serviços, a procuração e a declaração de hipossuficiência já estão sendo preparados. O escritório entrará em contato para a assinatura.</p>
        </div>`; };

      if (aceito) { showAccepted(); return; }

      area.innerHTML = `<button class="btn-accept" id="accept" disabled>Aceitar proposta</button>`;
      const btn = document.getElementById('accept');
      const refresh = () => {
        const ok = !hasClauses || (agree && agree.checked);
        btn.disabled = !ok;
        if (agreeBox) agreeBox.classList.toggle('on', !!(agree && agree.checked));
      };
      if (agree) agree.onchange = refresh;
      refresh();

      btn.onclick = async () => {
        if (btn.disabled) return;
        btn.disabled = true; btn.textContent = 'Registrando seu aceite…';
        try {
          const r = await fetch('/api/public/proposta/' + encodeURIComponent(token) + '/aceitar', { method: 'POST' });
          if (!r.ok) throw 0;
          showAccepted();
          area.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } catch { btn.disabled = false; btn.textContent = 'Aceitar proposta'; alert('Não foi possível registrar agora. Tente novamente.'); }
      };
    }
    load();
  </script>
</body>
</html>
