<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CRM Jurídico — Advocacia Letícia Barros</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#231E1A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CRM Letícia" />
  <script>try{var t=localStorage.getItem('crm_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Spectral:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- LOGIN -->
  <div id="login-view" class="login-view">
    <div class="login-brand-panel">
      <div class="brand-inner">
        <img class="login-emblem" src="/logo.png" alt="Letícia Barros — Advocacia" />
        <h1 class="login-name">Letícia Barros</h1>
        <p class="brand-sub">Advocacia &amp; Consultoria</p>
        <div class="brand-divider"></div>
        <p class="brand-tagline">Gestão jurídica com precisão, organização e cuidado com cada cliente.</p>
      </div>
    </div>
    <div class="login-form-panel">
      <div class="login-card">
        <h2>Acessar o sistema</h2>
        <p class="login-hint">Entre com suas credenciais para continuar</p>
        <form id="login-form">
          <label>E-mail
            <input type="email" id="login-email" required autocomplete="username" placeholder="seu@email.com" />
          </label>
          <label>Senha
            <input type="password" id="login-password" required autocomplete="current-password" placeholder="••••••••" />
          </label>
          <button type="submit" class="btn-primary">Entrar</button>
          <p id="login-error" class="error-msg"></p>
          <button type="button" id="forgot-link" class="btn-link" style="background:none;border:none;color:var(--gold,#b08d57);cursor:pointer;font-size:13px;margin-top:6px;text-decoration:underline">Esqueci minha senha</button>
        </form>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="app-view" class="app-view hidden">
    <div id="nav-overlay" class="nav-overlay"></div>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img class="emblem" src="/logo.png" alt="Letícia Barros" />
        <div>
          <strong>Letícia Barros</strong>
          <small>Advocacia &amp; Consultoria</small>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">
        <div class="user-chip">
          <span class="avatar" id="user-avatar">LB</span>
          <span id="user-name"></span>
        </div>
        <button id="logout-btn" class="btn-ghost">Sair</button>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <button id="nav-toggle" class="nav-toggle" title="Menu" aria-label="Menu">☰</button>
        <button id="sidebar-collapse" class="nav-toggle only-desktop" title="Recolher menu" aria-label="Recolher menu"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg></button>
        <div class="topbar-greeting" id="topbar-greeting"></div>
        <div class="topbar-actions">
          <button id="discover-btn" class="btn-gold btn-sm" title="Buscar processos novos por OAB (DJEN)"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg> Descobrir processos</button>
          <button id="fullscreen-btn" class="bell-icon" title="Tela cheia"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 4H5a1 1 0 0 0-1 1v3M16 4h3a1 1 0 0 1 1 1v3M8 20H5a1 1 0 0 1-1-1v-3M16 20h3a1 1 0 0 0 1-1v-3"/></svg></button>
          <button id="bell-btn" class="bell-icon" title="Notificações"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span id="bell-count" class="bell-count hidden">0</span></button>
        </div>
      </header>
      <div id="page" class="page"></div>
    </main>

    <!-- Barra de abas inferior (estilo app iOS) — só aparece no mobile -->
    <nav id="bottom-nav" class="bottom-nav" aria-label="Navegação rápida"></nav>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="btn-icon">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
