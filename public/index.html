<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Jurídico — Advocacia Letícia Barros</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- LOGIN -->
  <div id="login-view" class="login-view">
    <div class="login-brand-panel">
      <div class="brand-inner">
        <img class="login-emblem" src="/logo.png" alt="Letícia Barros — Advocacia" />
        <img class="login-wordmark" src="/wordmark.png" alt="Letícia Barros" />
        <p class="brand-sub">Advocacia &amp; Consultoria</p>
        <div class="brand-divider"></div>
        <p class="brand-tagline">Gestão jurídica com precisão, organização e cuidado com cada cliente.</p>
      </div>
    </div>
    <div class="login-form-panel">
      <div class="login-card">
        <h2>Acessar o sistema</h2>
        <p class="login-hint">Entre com suas credenciais para continuar</p>
        <form id="login-form">
          <label>E-mail
            <input type="email" id="login-email" required autocomplete="username" placeholder="seu@email.com" />
          </label>
          <label>Senha
            <input type="password" id="login-password" required autocomplete="current-password" placeholder="••••••••" />
          </label>
          <button type="submit" class="btn-primary">Entrar</button>
          <p id="login-error" class="error-msg"></p>
        </form>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="app-view" class="app-view hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img class="emblem" src="/logo.png" alt="Letícia Barros" />
        <div>
          <strong>Letícia Barros</strong>
          <small>Advocacia &amp; Consultoria</small>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">
        <div class="user-chip">
          <span class="avatar" id="user-avatar">LB</span>
          <span id="user-name"></span>
        </div>
        <button id="logout-btn" class="btn-ghost">Sair</button>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div class="topbar-greeting" id="topbar-greeting"></div>
        <div class="topbar-actions">
          <button id="bell-btn" class="bell-icon" title="Notificações">🔔<span id="bell-count" class="bell-count hidden">0</span></button>
        </div>
      </header>
      <div id="page" class="page"></div>
    </main>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="btn-icon">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
